            ## 1. Overview
            ### 1.3. Challenges
            - System Design: Handling data pipelines is often more difficult than training models, as it <span class="color-cyan"><em>requires advanced engineering skills</em></span> to fully optimize.
            - Board Game Properties:
              - The number of possible board positions can be <span class="color-cyan"><em>astronomically huge</em></span>. For example, in Go, it is roughly $10^{170}$.
              - Small input size but <span class="color-cyan"><em>highly dense information</em></span>.
              - The value of a state is subjective to the player's perspective and can <span class="color-cyan"><em>shift dramatically even with minor changes</em></span>.
              - The final result is <span class="color-cyan"><em>difficult to predict</em></span> from an early state, even for strong players.
          </textarea>
        </section>
        <section data-markdown style="text-align: left;">

            ## 1. Overview
            ### 1.4. Source Code
            [https://github.com/vjai-community/minimal-alpha-zero](https://github.com/vjai-community/minimal-alpha-zero)
            - Written from scratch (using Flax for model training).
            - Trained for an [m,n,k-game](https://en.wikipedia.org/wiki/M,n,k-game) on a small board (m=6, n=5, k=4).
            - The model is lightweight and does not require a GPU.
            - Training completes within several hours (using a MacBook or Ryzen with multiple cores).
          </textarea>

            ## 7. Summary
            ### 7.1. Core Takeaways
            - Given enough time and a sufficiently large number of simulations, <span class="color-cyan"><em>MCTS can find the optimal path</em></span> to a high reward, regardless of how inaccurate the initial prior probabilities and state values are.
            - Training in AlphaZero is equivalent to <span class="color-cyan"><em>teaching the neural network to mimic MCTS search results</em></span>. As training progresses, the network's raw outputs resemble a search with a high number of simulations, making the model stronger.
          </textarea>
